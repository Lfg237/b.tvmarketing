<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EmailJS - Interface Pro</title>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<style>
body { font-family: 'Segoe UI', sans-serif; background:#f5f5f5; margin:0; padding:0;}
header { background:#4a90e2; color:white; padding:20px; display:flex; align-items:center;}
header img { width:70px; height:70px; border-radius:50%; margin-right:15px;}
header h1 { margin:0; font-size:24px; }
main { max-width:1000px; margin:20px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.1);}
select, button { padding:10px; border-radius:5px; border:1px solid #ccc; margin:5px 0; }
#lotsContainer button { background:#4a90e2; color:white; border:none; cursor:pointer; margin:5px; transition:0.2s; }
#lotsContainer button:hover { background:#357ABD; }
#previewBox, #lotPreview { border:1px solid #ccc; padding:15px; margin:15px 0; background:#f0f8ff; border-radius:5px; max-height:300px; overflow:auto; }
table { width:100%; border-collapse: collapse; margin-top:10px;}
table, th, td { border:1px solid #ccc; }
th, td { padding:8px; text-align:left; }
th { background:#eee; }
.status-success { color:green; font-weight:bold;}
.status-error { color:red; font-weight:bold;}
</style>
</head>
<body>

<header>
<img src="https://raw.githubusercontent.com/Lfg237/m-dias/main/Polish_20260223_163236698.png" alt="Profil">
<h1>EmailJS Pro - Gestion des lots</h1>
</header>

<main>
<label for="templateSelect">Choisir un template :</label>
<select id="templateSelect"></select>
<button id="previewBtn">Voir Aperçu</button>

<div id="previewBox">Le contenu du message apparaîtra ici...</div>

<h3>Lots disponibles :</h3>
<div id="lotsContainer"></div>

<div id="lotPreview">
  <h4>Détails du lot sélectionné :</h4>
  <table id="lotTable">
    <thead><tr><th>#</th><th>Nom</th><th>Email</th><th>Statut</th></tr></thead>
    <tbody></tbody>
  </table>
  <button id="sendLotBtn">Envoyer ce lot</button>
</div>
</main>

<script>
emailjs.init("ScT_WhLLgCRgSJWt6");

const batchSize = 100;
const delay = 10000;
let contacts = [];
let currentBatch = [];

const templates = [
  { id:"template_dssfafd", title:"🛒 Message A - Articles en vente", content:"Bonjour {{to_name}},\nDécouvrez nos articles : https://business-tv.vercel.app/" },
  { id:"template_joboffers", title:"💼 Offres d'emploi", content:"Bonjour {{to_name}},\nConsultez les nouvelles offres : https://workshopkmer.vercel.app/#job1" },
  { id:"template_newsletter", title:"📢 Newsletter Business TV", content:"Bonjour {{to_name}},\nVoici notre newsletter du jour." }
];

const templateSelect = document.getElementById('templateSelect');
const previewBox = document.getElementById('previewBox');
const lotTableBody = document.querySelector('#lotTable tbody');

templates.forEach(t=>{
  const option = document.createElement('option');
  option.value = t.id;
  option.textContent = t.title;
  templateSelect.appendChild(option);
});

// Affichage de l'aperçu
document.getElementById('previewBtn').addEventListener('click', ()=>{
  const selected = templates.find(t=>t.id===templateSelect.value);
  previewBox.textContent = selected.content;
});

// Charger contacts
async function loadContacts() {
  const response = await fetch('contacts.json');
  contacts = await response.json();
  createLotButtons();
}

// Création des boutons de lot
function createLotButtons(){
  const container = document.getElementById('lotsContainer');
  container.innerHTML='';
  const totalLots = Math.ceil(contacts.length / batchSize);
  for(let i=1;i<=totalLots;i++){
    const btn = document.createElement('button');
    btn.textContent=`Lot ${i}`;
    btn.onclick = ()=>showLot(i);
    container.appendChild(btn);
  }
}

// Afficher les destinataires du lot
function showLot(lotNumber){
  const start = (lotNumber-1)*batchSize;
  const end = start+batchSize;
  currentBatch = contacts.slice(start,end);
  lotTableBody.innerHTML='';
  currentBatch.forEach((c,index)=>{
    const row = document.createElement('tr');
    row.innerHTML=`<td>${index+1}</td><td>${c.to_name}</td><td>${c.to_email}</td><td class="status">En attente</td>`;
    lotTableBody.appendChild(row);
  });
}

// Envoyer le lot
document.getElementById('sendLotBtn').addEventListener('click', async ()=>{
  if(currentBatch.length===0){ alert("Sélectionnez un lot !"); return; }
  const templateId = templateSelect.value;
  const selectedTemplate = templates.find(t=>t.id===templateId);
  alert(`Début envoi lot avec template "${selectedTemplate.title}"`);

  for(let i=0;i<currentBatch.length;i++){
    const person=currentBatch[i];
    const content = selectedTemplate.content.replace("{{to_name}}",person.to_name);
    try{
      await emailjs.send(
        "service_t2oycjs",
        templateId,
        { to_name: person.to_name, name:"Business TV", temps:new Date().toLocaleString() }
      );
      lotTableBody.rows[i].cells[3].innerHTML='✅ Envoyé';
      lotTableBody.rows[i].cells[3].className='status-success';
    }catch(err){
      lotTableBody.rows[i].cells[3].innerHTML='❌ Erreur';
      lotTableBody.rows[i].cells[3].className='status-error';
      console.error(person.to_name, err);
    }
  }
  alert('Lot terminé ! Pause avant prochain lot si nécessaire.');
});

loadContacts();
</script>

</body>
</html>
