select {

  margin-bottom:15px;
  font-size:16px;
}

button {
  padding:10px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  color:white;
  background: linear-gradient(to right, #6a11cb, #2575fc);

}
button:hover {

#previewBox, #lotPreview {

  padding:15px;
  margin:15px 0;
  background: #fdf6e3;
  border-left: 6px solid #ff7e5f;

  color:#333;

table {

}
table, th, td { border:1px solid #ddd; }
th { background:#ff7e5f; color:white; padding:10px;}
td { padding:8px; }
.status-success { color:green; font-weight:bold; background:#e6f4ea;}
.status-error { color:red; font-weight:bold; background:#fce8e6;}
.status-pending { color:orange; font-weight:bold; background:#fff4e5;}

footer {

  padding:15px;
  font-size:14px;
  color:#555;
  margin-top:20px;
}
</style>
</head>

// Création des boutons de lots
function createLotButtons(){
  const container = document.getElementById('lotsContainer');
  container.innerHTML='';
  const totalLots = Math.ceil(contacts.length / batchSize);
  for(let i=1;i<=totalLots;i++){
    const btn=document.createElement('button');
    btn.textContent=`Lot ${i}`;
    btn.onclick=()=>showLot(i);
    container.appendChild(btn);
  }
}

// Affichage d’un lot
function showLot(lotNumber){
  const start=(lotNumber-1)*batchSize;
  const end=start+batchSize;
  currentBatch=contacts.slice(start,end);
  lotTableBody.innerHTML='';
  currentBatch.forEach((c,index)=>{
    const row=document.createElement('tr');
    row.innerHTML=`<td>${index+1}</td><td>${c.to_name}</td><td>${c.to_email}</td><td class="status status-pending">En attente</td>`;
    lotTableBody.appendChild(row);
  });
}

// Compteur avant prochain lot
function startNextLotCountdown() {
  const sendBtn = document.getElementById('sendLotBtn');
  let remaining = delay / 1000;
  nextLotReady = false;
  sendBtn.disabled = true;

  const countdown = setInterval(() => {
    nextLotCountdown.textContent = `Prochain lot disponible dans ${remaining}s`;
    remaining--;

    if (remaining < 0) {
      clearInterval(countdown);
      sendBtn.disabled = false;
      nextLotCountdown.textContent = '';
      nextLotReady = true;
    }
  }, 1000);
}

// Envoi d’un lot
document.getElementById('sendLotBtn').addEventListener('click', async ()=>{
  if(!nextLotReady) { alert("Patientez le temps du compte à rebours !"); return; }
  if(currentBatch.length===0){ alert("Sélectionnez un lot !"); return; }

  const templateId = templateSelect.value;
  alert(`Début envoi lot avec template "${templateSelect.options[templateSelect.selectedIndex].text}"`);

  let successCount = 0;
  let failedContacts = [];

  for(let i=0;i<currentBatch.length;i++){
    const person=currentBatch[i];
    try{
      await emailjs.send(
        "service_t2oycjs",
        templateId,
        { 
          to_name: person.to_name, 
          profile_pic: person.profile_pic, 
          temps:new Date().toLocaleString() 
        }
      );
      lotTableBody.rows[i].cells[3].innerHTML='✅ Envoyé';
      lotTableBody.rows[i].cells[3].className='status-success';
      successCount++;
    }catch(err){
      lotTableBody.rows[i].cells[3].innerHTML='❌ Erreur';
      lotTableBody.rows[i].cells[3].className='status-error';
      failedContacts.push({name: person.to_name, email: person.to_email});
      console.error(person.to_name, err);
    }
  }

  alert(`Lot terminé !\n✅ Envoyés : ${successCount}\n❌ Échecs : ${failedContacts.length}`);
  if(failedContacts.length>0){
    console.table(failedContacts);
  }

  startNextLotCountdown();
});

loadContacts();
