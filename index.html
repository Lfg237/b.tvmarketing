<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EmailJS - Test Mobile Lots</title>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
padding:0;
background:linear-gradient(to right,#f0f4f8,#d9e2ec);
color:#333;
}

header{
background:linear-gradient(90deg,#ff7e5f,#feb47b);
color:white;
padding:15px;
display:flex;
align-items:center;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

header img{
width:50px;
height:50px;
border-radius:50%;
margin-right:10px;
border:2px solid white;
}

header h1{
margin:0;
font-size:20px;
}

main{
max-width:600px;
margin:10px auto;
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

select{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
color:white;
background:linear-gradient(to right,#6a11cb,#2575fc);
margin:4px 0;
}

.table-wrapper{
overflow-x:auto;
border-radius:8px;
margin:10px 0;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:6px 8px;
white-space:nowrap;
}

.status-success{
color:green;
font-weight:bold;
}

.status-error{
color:red;
font-weight:bold;
}

.status-pending{
color:orange;
font-weight:bold;
}

#previewBox{
border-radius:10px;
padding:10px;
margin:10px 0;
background:#fdf6e3;
border-left:5px solid #ff7e5f;
font-family:'Courier New',monospace;
}

footer{
text-align:center;
padding:10px;
font-size:12px;
color:#555;
}

</style>
</head>

<body>

<header>
<img src="https://raw.githubusercontent.com/Lfg237/m-dias/main/Polish_20260223_163236698.png">
<h1>EmailJS Mobile - Test Lots</h1>
</header>

<main>

<label>Choisir un template :</label>
<select id="templateSelect"></select>

<button id="previewBtn">Voir le contenu</button>

<div id="previewBox">Le contenu du message apparaîtra ici...</div>

<h3>Lots disponibles :</h3>
<div id="lotsContainer"></div>

<div id="lotPreview">

<h4>Détails du lot :</h4>

<div class="table-wrapper">
<table id="lotTable">

<thead>
<tr>
<th>#</th>
<th>Nom</th>
<th>Email</th>
<th>Statut</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

<p id="nextLotCountdown"></p>

<button id="sendLotBtn">Envoyer ce lot</button>

<p id="monthlyCounter" style="font-weight:bold;color:#444;"></p>

</div>

</main>

<footer>
© 2026 Business TV
</footer>

<script>

emailjs.init("ScT_WhLLgCRgSJWt6");

/* CONFIG */

const batchSize = 5;
const delay = 30000;

const MONTHLY_LIMIT = 200;

let contacts=[];
let currentBatch=[];
let nextLotReady=true;

/* compteur mensuel */

let sentThisMonth = 102;
let lastMonth=localStorage.getItem("lastMonth");
let currentMonth=new Date().getMonth();

if(lastMonth==null||parseInt(lastMonth)!==currentMonth){

sentThisMonth=0;
localStorage.setItem("sentThisMonth",0);
localStorage.setItem("lastMonth",currentMonth);

}

/* templates */

const templates=[

{
id:"template_xqc4p09",
title:"🛒 Articles en vente",
content:"Bonjour {{to_name}}, découvrez nos opportunités."
}

];

const templateSelect=document.getElementById("templateSelect");
const previewBox=document.getElementById("previewBox");
const lotTableBody=document.querySelector("#lotTable tbody");

/* select templates */

templates.forEach(t=>{
let option=document.createElement("option");
option.value=t.id;
option.textContent=t.title;
templateSelect.appendChild(option);
});

document.getElementById("previewBtn").onclick=()=>{

let selected=templates.find(t=>t.id===templateSelect.value);
previewBox.textContent=selected.content;

};

/* compteur */

function updateMonthlyCounter(){

let remaining = MONTHLY_LIMIT - sentThisMonth;

document.getElementById("monthlyCounter").textContent =
`Emails envoyés : ${sentThisMonth} / ${MONTHLY_LIMIT} | Restants : ${remaining}`;

}

updateMonthlyCounter();

/* validation email */

function isValidEmail(email){

let regex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
return regex.test(email);

}

/* contacts */

async function loadContacts(){

contacts=[

{to_name:"Mom",to_email:"mom502615@gmail.com"},
{to_name:"BTV",to_email:"btv495355@gmail.com"},
{to_name:"dalia",to_email:"dalyawa529@gmail.com"},
{to_name:"cfpf sorawell",to_email:"cfpf.sorawell@gmail.com"},
{to_name:"CNPS Mimboman",to_email:"cps.mimboman@cnps.cm"},
{to_name:"Gozen Service",to_email:"canditature@gozenservice.com"},
{to_name:"Donaldson King",to_email:"donaldsonking98@gamil.com"},
{to_name:"Scan Patriotic",to_email:"scanpatriotic@gmail.com"},
{to_name:"COTCO HR",to_email:"COTCO.HR@etscotco.com"},
{to_name:"Metro Acad",to_email:"metro.acad@gmail.com"},
{to_name:"Afrique Formation",to_email:"contact@afriqueformation-conseils.com"},
{to_name:"Complexe Santa Lucia",to_email:"complexesantalucia1@gmail.com"},
{to_name:"TotalEnergies MG",to_email:"MG-recrutement@totalenergies.mg"},
{to_name:"Recrutement Nkombiz",to_email:"recrutementnkombiz@gmail.com"},
{to_name:"Elflamam",to_email:"elflamam@gmail.com"},
{to_name:"IPRH",to_email:"infoiprh@gmail.com"},
{to_name:"Robert Mbong",to_email:"robertmbong18@gmail.com"},
{to_name:"Derick Tella",to_email:"dericktella4@gmail.com"},
{to_name:"User",to_email:"d25284703@gmail.com"},
{to_name:"Archange Michel",to_email:"archangemichel237@gmail.com"},
{to_name:"Archange Michel 2",to_email:"archangemichel420@gmail.com"},
{to_name:"Virginia Mbome",to_email:"virginiembomeruth@gmail.com"},
{to_name:"Brasseries Cameroun",to_email:"CamerounDesBrasseries@gmail.com"},
{to_name:"Ariel Jardin",to_email:"Arieljardin2023@gmail.com"},
{to_name:"Siddiki Amadou",to_email:"siddikiamadousiddiki@gmail.com"},
{to_name:"Dusch Monde",to_email:"duschmonde25@yahoo.fr"},
{to_name:"Jardin Nature",to_email:"jardinnature44@gmail.com"},
{to_name:"Green Insurance",to_email:"contact@green-insurance-brokerage.com"},
{to_name:"Prosoft Africa",to_email:"secretary@prosoftafrica.com"},
{to_name:"Marie Varloteaux",to_email:"varloteauxmarie@gmail.com"},
{to_name:"Beau Paysage",to_email:"beaupaysage84@gmail.com"},
{to_name:"Forest4Dev",to_email:"forest4dev@gmail.com"},
{to_name:"SNK Foundation",to_email:"contact@snk.foundation"},
{to_name:"ndeme",to_email:"carellelamelo@gmail.com"},
{to_name:"albert",to_email:"Albertndip@icloud.com"},
{to_name:"marie",to_email:"Marie4terence@gmail.com"},
{to_name:"tymperfect",to_email:"tymperfect038@gmail.com"},
{to_name:"CKJ Cameroun",to_email:"contact@ckj.cm"}

];

/* suppression doublons */

const seen=new Set();

contacts=contacts.filter(c=>{

let email=c.to_email.toLowerCase();

if(seen.has(email)) return false;

seen.add(email);

return true;

});

createLotButtons();

}

/* lots */

function createLotButtons(){

const container=document.getElementById("lotsContainer");

container.innerHTML="";

const totalLots=Math.ceil(contacts.length/batchSize);

for(let i=1;i<=totalLots;i++){

let btn=document.createElement("button");

btn.textContent=`Lot ${i}`;

btn.onclick=()=>showLot(i);

container.appendChild(btn);

}

}

function showLot(lotNumber){

const start=(lotNumber-1)*batchSize;

const end=start+batchSize;

currentBatch=contacts.slice(start,end);

lotTableBody.innerHTML="";

currentBatch.forEach((c,index)=>{

let row=document.createElement("tr");

row.innerHTML=

`<td>${index+1}</td>
<td>${c.to_name}</td>
<td>${c.to_email}</td>
<td class="status-pending">En attente</td>`;

lotTableBody.appendChild(row);

});

}

/* countdown */

function startNextLotCountdown(){

const sendBtn=document.getElementById("sendLotBtn");

let remaining=delay/1000;

nextLotReady=false;

sendBtn.disabled=true;

const countdown=setInterval(()=>{

document.getElementById("nextLotCountdown").textContent=
`Prochain lot dans ${remaining}s`;

remaining--;

if(remaining<0){

clearInterval(countdown);

sendBtn.disabled=false;

document.getElementById("nextLotCountdown").textContent="";

nextLotReady=true;

}

},1000);

}

/* envoi */

document.getElementById("sendLotBtn").onclick=async()=>{

if(!nextLotReady){

alert("Attendez la fin du délai");

return;

}

if(currentBatch.length===0){

alert("Sélectionnez un lot");

return;

}

const templateId=templateSelect.value;

for(let i=0;i<currentBatch.length;i++){

const person=currentBatch[i];

if(sentThisMonth>=MONTHLY_LIMIT){

alert("Limite 200 emails atteinte ce mois");

break;

}

if(!isValidEmail(person.to_email)){

lotTableBody.rows[i].cells[3].innerHTML="⚠️ Email invalide";

lotTableBody.rows[i].cells[3].className="status-error";

continue;

}

try{

await emailjs.send(

"service_t2oycjs",

templateId,

{

to_name:person.to_name,
to_email:person.to_email,
profile_pic:person.profile_pic,
temps:new Date().toLocaleString()

}

);

sentThisMonth++;

localStorage.setItem("sentThisMonth",sentThisMonth);

updateMonthlyCounter();

lotTableBody.rows[i].cells[3].innerHTML="✅ Envoyé";

lotTableBody.rows[i].cells[3].className="status-success";

}

catch(err){

lotTableBody.rows[i].cells[3].innerHTML="❌ Erreur";

lotTableBody.rows[i].cells[3].className="status-error";

console.error(err);

}

}

startNextLotCountdown();

};

loadContacts();

</script>

</body>
</html>
