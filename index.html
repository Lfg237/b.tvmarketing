<!DOCTYPE html>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin:0; padding:0;
  background: linear-gradient(to right, #f0f4f8, #d9e2ec);
  color:#333;
}

header {
  background: linear-gradient(90deg, #ff7e5f, #feb47b);
  color:white;
  padding:15px;
  display:flex;
  align-items:center;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
}
header img {
  width:50px; height:50px;
  border-radius:50%;
  margin-right:10px;
  border:2px solid white;
}
header h1 {
  margin:0; font-size:20px; text-shadow:1px 1px 2px #333;
}

main {
  max-width:600px;
  margin:10px auto;
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 15px rgba(0,0,0,0.1);
}

select {
  width:100%; padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
  margin-bottom:10px;
  font-size:14px;
}

button {
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
  color:white;
  background: linear-gradient(to right, #6a11cb, #2575fc);
  margin:4px 0;
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.05);
  background: linear-gradient(to right, #2575fc, #6a11cb);
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.table-wrapper {
  overflow-x:auto;
  border-radius:8px;
  margin:10px 0;
}

table {
  width:100%;
  border-collapse: collapse;
  min-width:300px;
}

th, td {
  border:1px solid #ddd;
  padding:6px 8px;
  white-space: nowrap;
}

.status-success { color:green; font-weight:bold; background:#e6f4ea;}
.status-error { color:red; font-weight:bold; background:#fce8e6;}
.status-pending { color:orange; font-weight:bold; background:#fff4e5;}

#previewBox {
  border-radius:10px;
  padding:10px;
  margin:10px 0;
  background: #fdf6e3;
  border-left: 5px solid #ff7e5f;
  font-family:'Courier New', monospace;
  color:#333;
}

#nextLotCountdown { margin:8px 0; font-weight:bold; color:#555;}

footer {
  text-align:center;
  padding:10px;
  font-size:12px;
  color:#555;
  margin-top:15px;
}

@media screen and (max-width: 480px) {
  button { width:100%; font-size:16px; padding:10px 0; }
  header h1 { font-size:18px; }
  header img { width:40px; height:40px; }
}
</style>
</head>
<body>

<main>
<label for="templateSelect">Choisir un template :</label>

<button id="previewBtn">Voir le contenu</button>
<div id="previewBox">Le contenu du message apparaîtra ici...</div>

<h3>Lots disponibles :</h3>
<div id="lotsContainer"></div>

<div id="lotPreview">
  <h4>Détails du lot sélectionné :</h4>
  <div class="table-wrapper">
    <table id="lotTable">
      <thead><tr><th>#</th><th>Nom</th><th>Email</th><th>Statut</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <p id="nextLotCountdown"></p>
  <button id="sendLotBtn">Envoyer ce lot</button>
</div>
</main>

<footer>
&copy; 2026 Business TV | Tous droits réservés
</footer>

document.getElementById('previewBtn').addEventListener('click', ()=>{

function createLotButtons(){
  const container = document.getElementById('lotsContainer');
  container.innerHTML='';
  const totalLots = Math.ceil(contacts.length / batchSize);
  for(let i=1;i<=totalLots;i++){
    const btn=document.createElement('button');
    btn.textContent=`Lot ${i}`;
    btn.onclick=()=>showLot(i);
    container.appendChild(btn);
  }
}

function showLot(lotNumber){
  const start=(lotNumber-1)*batchSize;
  const end=start+batchSize;
  currentBatch=contacts.slice(start,end);
  lotTableBody.innerHTML='';
  currentBatch.forEach((c,index)=>{
    const row=document.createElement('tr');
    row.innerHTML=`<td>${index+1}</td><td>${c.to_name}</td><td>${c.to_email}</td><td class="status status-pending">En attente</td>`;
    lotTableBody.appendChild(row);
  });
}

function startNextLotCountdown() {
  const sendBtn = document.getElementById('sendLotBtn');
  let remaining = delay / 1000;
  nextLotReady = false;
  sendBtn.disabled = true;

  const countdown = setInterval(() => {
    nextLotCountdown.textContent = `Prochain lot disponible dans ${remaining}s`;
    remaining--;
    if (remaining < 0) {
      clearInterval(countdown);
      sendBtn.disabled = false;
      nextLotCountdown.textContent = '';
      nextLotReady = true;
    }
  }, 1000);
}

document.getElementById('sendLotBtn').addEventListener('click', async ()=>{
  if(!nextLotReady) { alert("Patientez le temps du compte à rebours !"); return; }
  if(currentBatch.length===0){ alert("Sélectionnez un lot !"); return; }

  const templateId = templateSelect.value;
  const selectedTemplate = templates.find(t=>t.id===templateId);
  alert(`Début envoi lot avec template "${selectedTemplate.title}"`);

  for(let i=0;i<currentBatch.length;i++){
    const person=currentBatch[i];
    try{
      await emailjs.send(
  "service_t2oycjs",
  templateId,
  { 
    to_name: person.to_name,
    to_email: person.to_email,
    profile_pic: person.profile_pic,
    temps:new Date().toLocaleString()
  }
);
      lotTableBody.rows[i].cells[3].innerHTML='✅ Envoyé';
      lotTableBody.rows[i].cells[3].className='status-success';
    }catch(err){
      lotTableBody.rows[i].cells[3].innerHTML='❌ Erreur';
      lotTableBody.rows[i].cells[3].className='status-error';
      console.error(person.to_name, err);
    }
  }

  alert('Lot terminé ! Pause avant le prochain lot.');
  startNextLotCountdown();
});
